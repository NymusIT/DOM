<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Practica</title>
</head>
<body>
    <p class="d-inline-flex gap-2">
    <button class="btn btn-primary character-btn" type="button" id="Kai">
    Kai
    </button>

    <button class="btn btn-primary character-btn" type="button" id="Luna">
    Luna
    </button>

    <button class="btn btn-primary character-btn" type="button" id="Drako">
    Drako
    </button>

    </button>

    <div class="row">
    <div class="col">

        <div class="card-body">
            <h3 class="card-title" id="charName">
            Selecciona un personaje

            <p class="card-text" id="charDesc">
            Haz click en un nombre para ver su información.
        </p>

        <div id="charDetails"></div>
        </div>
    </div>
    </div>
    </div>
</div>

    <script type="module" src="app.js"></script>
